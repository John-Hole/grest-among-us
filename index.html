<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realmong Us - Hub</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .section-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent-cyan);
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            background: #2a3644;
            color: white;
            border: none;
            box-sizing: border-box;
            font-family: var(--font-ui);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .hub-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .auth-status {
            text-align: right;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 600px;
        }
        .task-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .task-row input {
            padding: 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="hub-layout">
        <!-- HOME SECTION -->
        <div id="section-home" class="section-container" style="text-align: center; margin-top: 1rem;">
            <div class="home-buttons">
                <button id="btn-go-create" class="btn" style="flex:1; background: var(--accent-cyan); color: black; font-size: 1.5rem; padding: 2rem;">CREA<br><span style="font-size:0.8rem">Manager</span></button>
                <button id="btn-go-join" class="btn" style="flex:1; background: var(--accent-green); font-size: 1.5rem; padding: 2rem;">UNISCITI<br><span style="font-size:0.8rem">Giocatore</span></button>
            </div>
            <div style="margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                <button id="btn-go-schermo" class="btn btn-schermo">
                    <span style="font-size: 1.5rem;">📺</span>
                    <span>
                        SCHERMATA GENERALE<br>
                        <span style="font-size: 0.75rem; text-transform: none; color: var(--accent-cyan); font-weight: normal;">Visualizzazione / Maxischermo</span>
                    </span>
                </button>
            </div>
        </div>

        <!-- AUTH MODAL (Popup) -->
        <div id="modal-auth-prompt" class="overlay-screen hidden" style="background: rgba(0,0,0,0.8); z-index: 100;">
            <div class="section-container" style="background: #222; border: 2px solid var(--accent-cyan);">
                <h2 style="text-align: center; margin-bottom: 1rem;">Vuoi accedere?</h2>
                <p style="text-align: center; font-size: 0.9rem; color: #ccc; margin-bottom: 2rem;">Accedendo potrai salvare i tuoi template per le prossime partite.</p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button id="btn-prompt-login" class="btn" style="background: var(--accent-green);">SÌ, ACCEDI</button>
                    <button id="btn-prompt-guest" class="btn btn-danger">NO, OSPITE</button>
                </div>
            </div>
        </div>

        <!-- AUTH SECTION (Login/Register Form) -->
        <div id="section-auth" class="section-container hidden">
            <h2>Account / Accesso</h2>
            <div class="form-group" style="margin-top: 1rem;">
                <input type="email" id="auth-email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="auth-password" placeholder="Password">
            </div>
            <div class="auth-buttons" style="margin-bottom: 1rem;">
                <button id="btn-login" class="btn" style="flex:1;">Accedi</button>
                <button id="btn-register" class="btn" style="flex:1; background: #3f51b5;">Registrati</button>
            </div>
            <button id="btn-auth-back" class="btn btn-danger" style="width: 100%; margin-top: 1rem;">Torna alla Home</button>
        </div>

        <!-- TEMPLATES DASHBOARD -->
        <div id="section-templates" class="section-container hidden" style="max-width: 800px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>I Tuoi Template</h2>
                <button id="btn-tpl-back" class="btn btn-danger" style="padding: 0.5rem 1rem;">Indietro</button>
            </div>
            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 2rem;">Seleziona un template per avviare istantaneamente la stanza, oppure creane uno nuovo.</p>
            
            <div id="templates-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
                <!-- Template cards dynamically injected here -->
            </div>
        </div>

        <!-- JOIN ROOM SECTION -->
        <div id="section-join" class="section-container hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Unisciti a una Stanza</h2>
                <button id="btn-join-back" class="btn btn-danger" style="padding: 0.5rem 1rem;">Indietro</button>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
                <input type="text" id="join-code" placeholder="Codice Stanza (es. ABCDE)" style="text-transform: uppercase;" maxlength="5">
            </div>
            <div class="form-group">
                <input type="text" id="join-name" placeholder="Il tuo Nome (Giocatore)" maxlength="15">
            </div>
            <button id="btn-join-room" class="btn" style="width: 100%; background: var(--accent-green);">ENTRA IN PARTITA</button>
        </div>

        <!-- CREATE NEW / EDIT TEMPLATE SETTINGS -->
        <div id="section-create" class="section-container hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Impostazioni Template</h2>
                <button id="btn-create-back" class="btn btn-danger" style="padding: 0.5rem 1rem;">Annulla</button>
            </div>
            
            <div class="form-group">
                <label>Nome Template *</label>
                <input type="text" id="create-template-name" placeholder="es. Partita tra amici">
            </div>
            
            <hr style="border-color: #333; margin: 1.5rem 0;">
            
            <div class="form-group">
                <label>Numero Impostori</label>
                <input type="number" id="create-impostors" value="2" min="1" max="10">
            </div>

            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex:1;">
                    <label>Kill Cooldown (sec)</label>
                    <input type="number" id="create-kill-cooldown" value="120" min="10">
                </div>
                <div style="flex:1;">
                    <label>Riunioni per Player</label>
                    <input type="number" id="create-max-meetings" value="1" min="0">
                </div>
            </div>

            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex:1;">
                    <label>Durata Discussione (sec)</label>
                    <input type="number" id="create-meeting-duration" value="120" min="10">
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                <input type="checkbox" id="create-scientist" checked style="width: auto;">
                <label style="margin:0;">Abilita Scienziato</label>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                <input type="checkbox" id="create-video-intro" checked style="width: auto;">
                <label style="margin:0;">Mostra video su tutti all'avvio</label>
            </div>
            
            <div class="form-group" style="display: flex; gap: 1rem; margin-top: 1rem;">
                <div style="flex:1;">
                    <label>Limite Giocatori</label>
                    <input type="number" id="create-max-players" value="15" min="2" max="100">
                </div>
                <div style="display: flex; align-items: flex-end; padding-bottom: 0.5rem; gap: 0.5rem;">
                    <input type="checkbox" id="create-unlimited-players" style="width: auto;">
                    <label style="margin:0;">Unlimited</label>
                </div>
            </div>
            
            <hr style="border-color: #333; margin: 1.5rem 0;">

            <h3>Modalità Mappa (Esperti)</h3>
            <div class="form-group" style="display: flex; gap: 1rem; margin-top: 1rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor:pointer;">
                    <input type="radio" name="map-mode" value="photo" checked> Mappa Visiva (Foto)
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor:pointer;">
                    <input type="radio" name="map-mode" value="text"> Elenco Testuale
                </label>
            </div>

            <div id="map-photo-config" class="form-group">
                <label>Carica Immagine Mappa (verrà compressa)</label>
                <input type="file" id="map-image-upload" accept="image/jpeg, image/png">
                <canvas id="map-canvas" style="display:none;"></canvas>
                <p id="upload-status" style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--accent-cyan);"></p>
            </div>

            <div id="map-text-config" class="form-group hidden">
                <label>Configura Task Testuali</label>
                <div id="text-tasks-container"></div>
                <button id="btn-add-text-task" class="btn" style="padding: 0.5rem; font-size: 0.8rem; margin-top: 0.5rem;">+ Aggiungi Task</button>
            </div>

            <button id="btn-save-start-room" class="btn" style="width: 100%; margin-top: 1.5rem; background: var(--accent-cyan); color: black;">SALVA E AVVIA STANZA</button>
        </div>
    </div>

    <script type="module" src="js/index.js"></script>
<script src="js/nav.js"></script></body>
</html>
