<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realmong Us - Monitor Scienziato</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .scienziato-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            box-sizing: border-box;
        }
        
        .header-panel {
            background: rgba(18, 24, 37, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.45);
        }

        .btn-call-meeting {
            background-color: var(--accent-red);
            font-size: clamp(1rem, 4vw, 1.25rem);
            padding: 1rem 1.5rem;
            min-height: 52px;
            border-radius: 12px;
            width: 100%;
            font-weight: 800;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 75, 75, 0.3);
        }
        .btn-call-meeting.available {
            animation: pulse-red 2s infinite;
        }
        .btn-call-meeting:disabled {
            opacity: 0.4;
            animation: none !important;
            box-shadow: none !important;
        }

        @media (min-width: 600px) {
            .header-panel {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .btn-call-meeting {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="scienziato-container">
        <div class="header-panel">
            <div>
                <h1 style="color: var(--accent-cyan); font-size: clamp(1.2rem, 4vw, 1.5rem); letter-spacing: 0.5px; text-transform: uppercase;">MONITOR PARAMETRI VITALI</h1>
                <p id="game-status-text" style="margin-top: 0.4rem; color: #94a3b8; font-weight: 600; font-size: 0.9rem;">Stato: IN ATTESA</p>
            </div>
            
            <button id="btn-emergency" class="btn btn-call-meeting" disabled>CHIAMA RIUNIONE (1/Round)</button>
        </div>

        <div class="glass-card">
            <div class="glass-card-header">
                <div class="glass-card-header-left">
                    <span class="header-icon">🩺</span>
                    <h2>STATO ELETTROCARDIOGRAMMA GIOCATORI</h2>
                </div>
            </div>
            <div id="vitals-container" class="vitals-grid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Script as module -->
    <script type="module" src="js/scienziato.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
