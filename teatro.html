<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREST Among Us - Maxischermo</title>
    <link rel="stylesheet" href="css/global.css">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <!-- Fullscreen Video (Hidden by default, triggered on load or game start) -->
    <video id="intro-video" class="hidden" autoplay playsinline>
        <source src="public/assets/intro.mp4" type="video/mp4">
        Il tuo browser non supporta i video.
    </video>

    <!-- Siren Audio for Emergencies -->
    <audio id="siren-audio" src="public/assets/sirena.mp3" preload="auto"></audio>

    <!-- Meeting / Alert Overlays -->
    <div id="overlay-meeting" class="overlay-screen hidden">
        <h1 id="overlay-text" class="alert-text">RIUNIONE CHIAMATA</h1>
    </div>
    
    <div id="overlay-ejected" class="overlay-screen hidden">
        <h1 id="ejected-text" style="color: white; font-size: 3rem;">Nessuno è stato espulso</h1>
    </div>

    <!-- Waiting Lobby Layout -->
    <div id="waiting-lobby" class="hidden" style="display: flex; flex-direction: column; height: 100vh; padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <!-- Left: QR Code -->
            <div style="background: white; padding: 1rem; border-radius: 12px; display: inline-block;">
                <div id="qrcode"></div>
                <p style="color: black; font-weight: bold; text-align: center; margin-top: 0.5rem; font-size: 0.8rem;">Inquadra per unirti!</p>
            </div>
            
            <!-- Right: Code and Players count -->
            <div style="text-align: right; background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 2px solid var(--accent-cyan);">
                <h2 style="font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: 5px; color: var(--accent-cyan);" id="lobby-room-code">ABCDE</h2>
                <p style="font-size: 1.5rem;" id="lobby-players-count">Giocatori: 0 / 15</p>
            </div>
        </div>

        <!-- Center: Roster -->
        <div style="flex-grow: 1; background: rgba(0,0,0,0.5); border-radius: 12px; border: 2px solid #333; padding: 2rem; overflow-y: auto;">
            <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">IN ATTESA DEI GIOCATORI...</h2>
            <div id="lobby-roster" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;">
                <!-- Roster players populated here -->
            </div>
        </div>
    </div>

    <!-- Main Teatro Interface -->
    <div class="teatro-header">
        <div id="global-timer">10:00</div>
    </div>

    <div class="teatro-layout">
        <!-- Left: Task Progress Bar -->
        <div class="task-bar-container">
            <h2 style="font-size: 1rem; text-align: center; margin-bottom: 0.5rem; color: var(--accent-cyan);">Task Globali</h2>
            <div class="task-progress-wrap">
                <div id="task-progress-fill" class="task-progress-fill"></div>
            </div>
            <p id="task-progress-text" style="text-align: center; margin-top: 0.5rem; font-weight: bold;">0 / 100%</p>
        </div>

        <!-- Center: Map or Text -->
        <div class="map-container" id="map-container">
            <img id="map-image" src="public/assets/mappa.jpg" alt="Mappa della navicella">
            
            <div id="text-map-container" class="hidden" style="width: 100%; height: 90vh; background: var(--card-bg); overflow-y: auto; padding: 1rem; border-radius: 12px; border: 4px solid var(--accent-cyan);">
                <h2 style="color: var(--accent-cyan); text-align: center; margin-bottom: 1rem;">ELENCO TASK DISPONIBILI</h2>
                <table id="text-tasks-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--accent-cyan);">
                            <th style="padding: 0.5rem;">N°</th>
                            <th style="padding: 0.5rem;">Task</th>
                            <th style="padding: 0.5rem;">Obiettivo</th>
                            <th style="padding: 0.5rem;">Luogo</th>
                        </tr>
                    </thead>
                    <tbody id="text-tasks-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Right: Player List -->
        <div class="players-sidebar">
            <h2 style="font-size: 1rem; text-align: center; margin-bottom: 1rem; color: var(--accent-cyan);">Equipaggio</h2>
            <div id="players-list-container">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Script as module to use import -->
    <script type="module" src="js/teatro.js"></script>
<script src="js/nav.js"></script></body>
</html>
