<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realmong Us - Mappa Oratorio</title>
    <link rel="stylesheet" href="css/global.css">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Map Controls Toolbar */
        .map-toolbar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            display: flex;
            gap: 6px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .map-tool-btn {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .map-tool-btn:hover {
            background: var(--accent-cyan, #00f2fe);
            color: #000;
            transform: scale(1.1);
        }

        .map-tool-btn.active {
            background: var(--accent-cyan, #00f2fe);
            color: #000;
            box-shadow: 0 0 10px var(--accent-cyan, #00f2fe);
        }

        .svg-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
        }

        .svg-container svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.7));
            transition: transform 0.2s ease;
        }

        /* SVG Room Hovering: Illuminates borders only */
        .svg-container svg text,
        .svg-container svg tspan,
        .svg-container svg #layer1 {
            pointer-events: none !important;
        }

        .svg-container svg path[id] {
            transition: stroke 0.2s ease, stroke-width 0.2s ease, filter 0.2s ease;
        }

        .svg-container svg path[id]:hover {
            stroke: #000000 !important;
            stroke-width: 2.2px !important;
            filter: drop-shadow(0 0 10px #00f2fe) brightness(1.1);
        }

        /* Black/Closed rooms: do NOT highlight on hover */
        .svg-container svg path.closed-room,
        .svg-container svg path.closed-room:hover,
        .svg-container svg path[id="Sala Chiusa"]:hover,
        .svg-container svg path[id="Caldaia"]:hover,
        .svg-container svg path[id="Locale Tecnico"]:hover,
        .svg-container svg path[id="Collegamento Suore"]:hover,
        .svg-container svg path[id="Ripostiglio Palco"]:hover {
            pointer-events: none !important;
            stroke: #000000 !important;
            stroke-width: 0.7px !important;
            filter: none !important;
        }

        /* Hover Tooltip */
        .room-tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--accent-cyan, #00f2fe);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: var(--font-ui, sans-serif);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: none;
            transform: translate(-50%, -120%);
        }
    </style>
</head>
<body class="schermo-body">

    <!-- Main Dashboard Interface (Schermo Grid) -->
    <div class="schermo-lobby-container" id="main-dashboard-layout">
        
        <!-- LEFT COLUMN: QR Code & Task List -->
        <div class="schermo-left-col">
            <!-- QR Code Section -->
            <div id="qr-code-container" class="schermo-card qr-card">
                <div class="qr-info-header">UNISCITI ALLA STANZA</div>
                <div id="qrcode" class="qrcode-wrapper"></div>
                <div class="qr-room-badge">
                    <span class="qr-label">STANZA:</span>
                    <span id="waiting-room-code" class="qr-code-text">ORATORIO</span>
                </div>
            </div>

            <!-- Task List Box (Left) -->
            <div id="left-tasks-container" class="schermo-card left-tasks-card">
                <div class="schermo-card-header">
                    <span class="header-icon">📋</span>
                    <h2>TASK IN GIOCO</h2>
                </div>
                <div id="left-tasks-scroll" class="auto-scroll-box">
                    <ul id="left-tasks-list" class="schermo-tasks-ul">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- CENTER COLUMN: Room Code & SVG Map -->
        <div class="schermo-center-col">
            <!-- Room Code / Timer Header -->
            <div class="schermo-card center-header-card">
                <div id="global-timer" class="game-timer">08:45</div>
                <div class="room-code-display">
                    <span class="code-title">CODICE STANZA</span>
                    <span id="header-room-code" class="code-val">ORATORIO-2026</span>
                </div>
            </div>

            <!-- Center Main Area: SVG Map View -->
            <div class="schermo-card center-main-card" style="position: relative;">
                
                <!-- Zoom & View Controls Toolbar -->
                <div class="map-toolbar">
                    <button class="map-tool-btn" id="btn-zoom-in" title="Ingrandisci (+)">➕</button>
                    <button class="map-tool-btn" id="btn-zoom-out" title="Riduci (-)">➖</button>
                    <button class="map-tool-btn" id="btn-zoom-reset" title="Ripristina vista">🔄</button>
                    <button class="map-tool-btn active" id="btn-toggle-labels" title="Mostra/Nascondi Etichette">🏷️</button>
                </div>

                <!-- Map View Wrapper -->
                <div id="map-view-wrapper" class="map-view-wrapper">
                    <div id="svg-map-container" class="svg-container">
                        <!-- SVG map injected dynamically here -->
                        <div style="color: #64748b; font-family: var(--font-ui);">Caricamento MappaOratotorio.svg...</div>
                    </div>
                </div>

            </div>

            <!-- Footer: Task Progress Bar -->
            <div id="taskbar-container" class="schermo-card taskbar-card">
                <div class="taskbar-info">
                    <span class="taskbar-title">PROGRESSO TASK GLOBALI</span>
                    <span id="task-progress-text" class="taskbar-pct">58%</span>
                </div>
                <div class="task-progress-wrap">
                    <div id="task-progress-fill" class="task-progress-fill" style="width: 58%;"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: Players List -->
        <div class="schermo-right-col">
            <div class="schermo-card players-card">
                <div class="schermo-card-header">
                    <span class="header-icon">👥</span>
                    <h2>GIOCATORI <span id="waiting-players-count" class="players-limit-badge">8/10</span></h2>
                </div>
                <div id="players-scroll-container" class="auto-scroll-box">
                    <div id="players-list-container" class="players-grid-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Page script -->
    <script type="module" src="js/mappa_oratorio.js?v=3"></script>
    <script src="js/nav.js"></script>
</body>
</html>
